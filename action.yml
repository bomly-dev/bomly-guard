name: "Bomly Review"
description: "Review dependency changes in pull requests with bomly diff"
author: "Bomly"
inputs:
  repo-token:
    description: Token for repository API access.
    required: false
    default: ${{ github.token }}
  cli-repo-token:
    description: Token for reading Bomly CLI releases.
    required: false
    default: ${{ github.token }}
  version:
    description: Bomly CLI version to install, such as latest, v0.4.6, or 0.4.6.
    required: false
    default: latest
  log-level:
    description: Bomly CLI log level, one of quiet, verbose, or debug.
    required: false
    default: verbose
  fail-on-severity:
    description: Lowest vulnerability severity that should fail review.
    required: false
  fail-on-scopes:
    description: Comma-separated dependency scopes that may fail review.
    required: false
  base-ref:
    description: Base git ref to compare.
    required: false
  head-ref:
    description: Head git ref to compare.
    required: false
  config-file:
    description: Local config path or owner/repo/path@ref external config reference.
    required: false
  external-repo-token:
    description: Token for reading an external config file.
    required: false
  allow-licenses:
    description: Comma-separated SPDX licenses to allow.
    required: false
  deny-licenses:
    description: Comma-separated SPDX licenses to deny.
    required: false
  allow-dependencies-licenses:
    description: Comma-separated package URLs exempt from license policy.
    required: false
  allow-ghsas:
    description: Comma-separated vulnerability IDs to allow.
    required: false
  deny-packages:
    description: Comma-separated package URLs to deny.
    required: false
  deny-groups:
    description: Comma-separated package URL namespaces to deny.
    required: false
  protected-packages:
    description: Comma-separated package names to protect from typosquatting.
    required: false
  typosquat-threshold:
    description: Similarity threshold for suspicious package names.
    required: false
  typosquat-mode:
    description: Typosquatting policy mode, warn or fail.
    required: false
  warn-only:
    description: Downgrade failing findings to warnings.
    required: false
  comment-summary-in-pr:
    description: "Comment mode: never, always, or on-failure."
    required: false
outputs:
  comment-content:
    description: Prepared dependency review markdown summary.
    value: ${{ steps.extract.outputs.comment-content }}
  dependency-changes:
    description: All dependency changes as JSON.
    value: ${{ steps.extract.outputs.dependency-changes }}
  vulnerable-changes:
    description: Introduced vulnerability findings as JSON.
    value: ${{ steps.extract.outputs.vulnerable-changes }}
  invalid-license-changes:
    description: Introduced license findings as JSON.
    value: ${{ steps.extract.outputs.invalid-license-changes }}
  denied-changes:
    description: Introduced denied package findings as JSON.
    value: ${{ steps.extract.outputs.denied-changes }}
  suspicious-package-changes:
    description: Introduced suspicious package findings as JSON.
    value: ${{ steps.extract.outputs.suspicious-package-changes }}
  sarif-file:
    description: Path to the generated SARIF file.
    value: ${{ steps.run.outputs.sarif-file }}
runs:
  using: composite
  steps:
    - name: Detect platform
      id: platform
      shell: bash
      run: bash "${{ github.action_path }}/scripts/detect-platform.sh"

    - name: Resolve Bomly version
      id: version
      shell: bash
      env:
        INPUT_VERSION: ${{ inputs.version }}
        INPUT_CLI_REPO_TOKEN: ${{ inputs.cli-repo-token }}
        INPUT_REPO_TOKEN: ${{ inputs.repo-token }}
      run: bash "${{ github.action_path }}/scripts/resolve-version.sh"

    - name: Install Bomly CLI
      id: install
      shell: bash
      env:
        VERSION: ${{ steps.version.outputs.version }}
        TARGET_OS: ${{ steps.platform.outputs.os }}
        TARGET_ARCH: ${{ steps.platform.outputs.arch }}
        ARCHIVE_EXT: ${{ steps.platform.outputs.ext }}
        BINARY_NAME: ${{ steps.platform.outputs.binary }}
        INPUT_CLI_REPO_TOKEN: ${{ inputs.cli-repo-token }}
        INPUT_REPO_TOKEN: ${{ inputs.repo-token }}
      run: bash "${{ github.action_path }}/scripts/install.sh"

    - name: Resolve refs
      id: refs
      shell: bash
      env:
        INPUT_BASE_REF: ${{ inputs.base-ref }}
        INPUT_HEAD_REF: ${{ inputs.head-ref }}
      run: node "${{ github.action_path }}/scripts/resolve-refs.js"

    - name: Fetch refs
      shell: bash
      env:
        BASE_REF: ${{ steps.refs.outputs.base }}
        HEAD_REF: ${{ steps.refs.outputs.head }}
      run: bash "${{ github.action_path }}/scripts/fetch-refs.sh"

    - name: Prepare config
      id: config
      shell: bash
      env:
        INPUT_CONFIG_FILE: ${{ inputs.config-file }}
        INPUT_EXTERNAL_REPO_TOKEN: ${{ inputs.external-repo-token }}
        INPUT_REPO_TOKEN: ${{ inputs.repo-token }}
      run: bash "${{ github.action_path }}/scripts/prepare-config.sh"

    - name: Run bomly diff
      id: run
      shell: bash
      env:
        BASE_REF: ${{ steps.refs.outputs.base }}
        HEAD_REF: ${{ steps.refs.outputs.head }}
        CONFIG_FILE: ${{ steps.config.outputs.path }}
        INPUT_LOG_LEVEL: ${{ inputs.log-level }}
        INPUT_FAIL_ON_SEVERITY: ${{ inputs.fail-on-severity }}
        INPUT_FAIL_ON_SCOPES: ${{ inputs.fail-on-scopes }}
        INPUT_ALLOW_LICENSES: ${{ inputs.allow-licenses }}
        INPUT_DENY_LICENSES: ${{ inputs.deny-licenses }}
        INPUT_ALLOW_DEPENDENCIES_LICENSES: ${{ inputs.allow-dependencies-licenses }}
        INPUT_ALLOW_GHSAS: ${{ inputs.allow-ghsas }}
        INPUT_DENY_PACKAGES: ${{ inputs.deny-packages }}
        INPUT_DENY_GROUPS: ${{ inputs.deny-groups }}
        INPUT_PROTECTED_PACKAGES: ${{ inputs.protected-packages }}
        INPUT_TYPOSQUAT_THRESHOLD: ${{ inputs.typosquat-threshold }}
        INPUT_TYPOSQUAT_MODE: ${{ inputs.typosquat-mode }}
        INPUT_WARN_ONLY: ${{ inputs.warn-only }}
        INPUT_COMMENT_SUMMARY_IN_PR: ${{ inputs.comment-summary-in-pr }}
      run: bash "${{ github.action_path }}/scripts/run-diff.sh"

    - name: Set outputs
      id: extract
      shell: bash
      env:
        DIFF_JSON: ${{ steps.run.outputs.diff-json }}
        SUMMARY_MD: ${{ steps.run.outputs.summary-md }}
      run: node "${{ github.action_path }}/scripts/extract-outputs.js"

    - name: Upload SARIF
      id: upload-sarif
      if: ${{ steps.run.outputs.sarif-file != '' }}
      continue-on-error: true
      uses: github/codeql-action/upload-sarif@v4
      with:
        sarif_file: ${{ steps.run.outputs.sarif-file }}
        category: bomly

    - name: Report SARIF upload status
      if: ${{ steps.run.outputs.sarif-file != '' && steps.upload-sarif.outcome == 'failure' }}
      shell: bash
      run: echo "::warning::Bomly SARIF upload failed. Bomly policy result will still determine this job."

    - name: Comment on pull request
      if: ${{ steps.refs.outputs.pr != '' && (inputs.comment-summary-in-pr == 'always' || (inputs.comment-summary-in-pr == 'on-failure' && steps.extract.outputs.issue-found == 'true')) }}
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.repo-token }}
        PR_NUMBER: ${{ steps.refs.outputs.pr }}
        COMMENT_MD: ${{ steps.extract.outputs.comment-md }}
      run: bash "${{ github.action_path }}/scripts/comment-pr.sh"

    - name: Complete policy result
      shell: bash
      env:
        EXIT_CODE: ${{ steps.run.outputs.exit-code }}
      run: bash "${{ github.action_path }}/scripts/complete-policy.sh"
