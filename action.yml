name: "Bomly Review"
description: "Review dependency changes in pull requests with bomly diff"
author: "Bomly"
inputs:
  repo-token:
    description: Token for repository API access.
    required: false
    default: ${{ github.token }}
  cli-repo-token:
    description: Token for reading Bomly CLI releases.
    required: false
    default: ${{ github.token }}
  version:
    description: Bomly CLI version to install, such as latest, v0.4.6, or 0.4.6.
    required: false
    default: latest
  fail-on-severity:
    description: Lowest vulnerability severity that should fail review.
    required: false
  fail-on-scopes:
    description: Comma-separated dependency scopes that may fail review.
    required: false
  base-ref:
    description: Base git ref to compare.
    required: false
  head-ref:
    description: Head git ref to compare.
    required: false
  config-file:
    description: Local config path or owner/repo/path@ref external config reference.
    required: false
  external-repo-token:
    description: Token for reading an external config file.
    required: false
  allow-licenses:
    description: Comma-separated SPDX licenses to allow.
    required: false
  deny-licenses:
    description: Comma-separated SPDX licenses to deny.
    required: false
  allow-dependencies-licenses:
    description: Comma-separated package URLs exempt from license policy.
    required: false
  allow-ghsas:
    description: Comma-separated vulnerability IDs to allow.
    required: false
  deny-packages:
    description: Comma-separated package URLs to deny.
    required: false
  deny-groups:
    description: Comma-separated package URL namespaces to deny.
    required: false
  protected-packages:
    description: Comma-separated package names to protect from typosquatting.
    required: false
  typosquat-threshold:
    description: Similarity threshold for suspicious package names.
    required: false
  typosquat-mode:
    description: Typosquatting policy mode, warn or fail.
    required: false
  warn-only:
    description: Downgrade failing findings to warnings.
    required: false
  comment-summary-in-pr:
    description: "Comment mode: never, always, or on-failure."
    required: false
outputs:
  comment-content:
    description: Prepared dependency review markdown comment.
    value: ${{ steps.extract.outputs.comment-content }}
  dependency-changes:
    description: All dependency changes as JSON.
    value: ${{ steps.extract.outputs.dependency-changes }}
  vulnerable-changes:
    description: Introduced vulnerability findings as JSON.
    value: ${{ steps.extract.outputs.vulnerable-changes }}
  invalid-license-changes:
    description: Introduced license findings as JSON.
    value: ${{ steps.extract.outputs.invalid-license-changes }}
  denied-changes:
    description: Introduced denied package findings as JSON.
    value: ${{ steps.extract.outputs.denied-changes }}
  suspicious-package-changes:
    description: Introduced suspicious package findings as JSON.
    value: ${{ steps.extract.outputs.suspicious-package-changes }}
runs:
  using: composite
  steps:
    - name: Detect platform
      id: platform
      shell: bash
      run: |
        set -euo pipefail
        case "${{ runner.os }}-${{ runner.arch }}" in
          Linux-X64)    os="linux"; arch="amd64"; ext="tar.gz"; binary="bomly" ;;
          Linux-ARM64)  os="linux"; arch="arm64"; ext="tar.gz"; binary="bomly" ;;
          macOS-X64)    os="darwin"; arch="amd64"; ext="tar.gz"; binary="bomly" ;;
          macOS-ARM64)  os="darwin"; arch="arm64"; ext="tar.gz"; binary="bomly" ;;
          Windows-X64)  os="windows"; arch="amd64"; ext="zip"; binary="bomly.exe" ;;
          Windows-ARM64) os="windows"; arch="arm64"; ext="zip"; binary="bomly.exe" ;;
          *)
            echo "::error::Unsupported platform: ${{ runner.os }}-${{ runner.arch }}"
            exit 1
            ;;
        esac
        echo "os=$os" >> "$GITHUB_OUTPUT"
        echo "arch=$arch" >> "$GITHUB_OUTPUT"
        echo "ext=$ext" >> "$GITHUB_OUTPUT"
        echo "binary=$binary" >> "$GITHUB_OUTPUT"

    - name: Resolve Bomly version
      id: version
      shell: bash
      env:
        INPUT_VERSION: ${{ inputs.version }}
        INPUT_CLI_REPO_TOKEN: ${{ inputs.cli-repo-token }}
        INPUT_REPO_TOKEN: ${{ inputs.repo-token }}
      run: |
        set -euo pipefail
        export GH_TOKEN="${INPUT_CLI_REPO_TOKEN:-$INPUT_REPO_TOKEN}"
        version="$INPUT_VERSION"
        if [ "$version" = "latest" ]; then
          version="$(gh release view --repo bomly-dev/bomly-cli --json tagName -q '.tagName')"
        fi
        if [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.]+)?$ ]]; then
          version="v${version}"
        fi
        if [[ ! "$version" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.]+)?$ ]]; then
          echo "::error::Invalid Bomly version '$version'. Use latest, vX.Y.Z, or X.Y.Z."
          exit 1
        fi
        echo "version=$version" >> "$GITHUB_OUTPUT"

    - name: Install Bomly CLI
      id: install
      shell: bash
      env:
        VERSION: ${{ steps.version.outputs.version }}
        TARGET_OS: ${{ steps.platform.outputs.os }}
        TARGET_ARCH: ${{ steps.platform.outputs.arch }}
        ARCHIVE_EXT: ${{ steps.platform.outputs.ext }}
        BINARY_NAME: ${{ steps.platform.outputs.binary }}
        INPUT_CLI_REPO_TOKEN: ${{ inputs.cli-repo-token }}
        INPUT_REPO_TOKEN: ${{ inputs.repo-token }}
      run: |
        set -euo pipefail
        export GH_TOKEN="${INPUT_CLI_REPO_TOKEN:-$INPUT_REPO_TOKEN}"
        archive="bomly_${VERSION}_${TARGET_OS}_${TARGET_ARCH}.${ARCHIVE_EXT}"
        work_dir="$(mktemp -d)"
        trap 'rm -rf "$work_dir"' EXIT

        echo "::group::Downloading Bomly ${VERSION}"
        gh release download "$VERSION" \
          --repo bomly-dev/bomly-cli \
          --pattern "$archive" \
          --pattern SHA256SUMS \
          --dir "$work_dir" \
          --clobber

        expected_hash="$(awk -v archive="$archive" '{name=$NF; sub(/^dist\//, "", name); if (name == archive) {print $1; exit}}' "${work_dir}/SHA256SUMS")"
        if [ -z "$expected_hash" ]; then
          echo "::error::Archive '${archive}' was not found in SHA256SUMS"
          exit 1
        fi
        if [[ ! "$expected_hash" =~ ^[0-9a-fA-F]{64}$ ]]; then
          echo "::error::Malformed SHA256SUMS entry for '${archive}'"
          exit 1
        fi
        if command -v sha256sum >/dev/null 2>&1; then
          actual_hash="$(sha256sum "${work_dir}/${archive}" | awk '{print $1}')"
        else
          actual_hash="$(shasum -a 256 "${work_dir}/${archive}" | awk '{print $1}')"
        fi
        expected_hash_lc="$(printf '%s' "$expected_hash" | tr '[:upper:]' '[:lower:]')"
        actual_hash_lc="$(printf '%s' "$actual_hash" | tr '[:upper:]' '[:lower:]')"
        if [ "$expected_hash_lc" != "$actual_hash_lc" ]; then
          echo "::error::Checksum mismatch for '${archive}'"
          exit 1
        fi

        mkdir "${work_dir}/extract"
        if [ "$ARCHIVE_EXT" = "zip" ]; then
          unzip -q "${work_dir}/${archive}" -d "${work_dir}/extract"
        else
          tar xzf "${work_dir}/${archive}" -C "${work_dir}/extract"
        fi
        if [ -L "${work_dir}/extract/${BINARY_NAME}" ] || [ ! -f "${work_dir}/extract/${BINARY_NAME}" ]; then
          echo "::error::Expected Bomly binary '${BINARY_NAME}' was not found"
          exit 1
        fi

        install_dir="${RUNNER_TOOL_CACHE:-${RUNNER_TEMP:-/tmp}}/bomly/${VERSION}/${TARGET_OS}-${TARGET_ARCH}"
        mkdir -p "$install_dir"
        mv "${work_dir}/extract/${BINARY_NAME}" "$install_dir/"
        chmod +x "$install_dir/${BINARY_NAME}" 2>/dev/null || true
        echo "$install_dir" >> "$GITHUB_PATH"
        echo "version=$VERSION" >> "$GITHUB_OUTPUT"
        echo "::endgroup::"

    - name: Resolve refs
      id: refs
      shell: bash
      env:
        INPUT_BASE_REF: ${{ inputs.base-ref }}
        INPUT_HEAD_REF: ${{ inputs.head-ref }}
      run: |
        set -euo pipefail
        node <<'NODE'
        const fs = require('fs')
        const event = process.env.GITHUB_EVENT_NAME || ''
        const payloadPath = process.env.GITHUB_EVENT_PATH || ''
        const payload = payloadPath && fs.existsSync(payloadPath)
          ? JSON.parse(fs.readFileSync(payloadPath, 'utf8'))
          : {}
        let base = process.env.INPUT_BASE_REF || ''
        let head = process.env.INPUT_HEAD_REF || ''
        let pr = ''
        if ((!base || !head) && (event === 'pull_request' || event === 'pull_request_target')) {
          base = base || payload.pull_request?.base?.sha || ''
          head = head || payload.pull_request?.head?.sha || ''
          pr = String(payload.pull_request?.number || '')
        }
        if ((!base || !head) && event === 'merge_group') {
          base = base || payload.merge_group?.base_sha || ''
          head = head || payload.merge_group?.head_sha || ''
        }
        if (!pr && payload.pull_request?.number) {
          pr = String(payload.pull_request.number)
        }
        if (!base || !head) {
          throw new Error('Both base-ref and head-ref are required outside pull_request, pull_request_target, or merge_group events')
        }
        const out = process.env.GITHUB_OUTPUT
        fs.appendFileSync(out, `base=${base}\nhead=${head}\npr=${pr}\n`)
        NODE

    - name: Fetch refs
      shell: bash
      env:
        BASE_REF: ${{ steps.refs.outputs.base }}
        HEAD_REF: ${{ steps.refs.outputs.head }}
      run: |
        set -euo pipefail
        missing=0
        git cat-file -e "${BASE_REF}^{commit}" 2>/dev/null || missing=1
        git cat-file -e "${HEAD_REF}^{commit}" 2>/dev/null || missing=1
        if [ "$missing" = "1" ]; then
          git fetch --no-tags --prune --depth=1 origin "$BASE_REF" "$HEAD_REF"
        fi

    - name: Prepare config
      id: config
      shell: bash
      env:
        INPUT_CONFIG_FILE: ${{ inputs.config-file }}
        INPUT_EXTERNAL_REPO_TOKEN: ${{ inputs.external-repo-token }}
        INPUT_REPO_TOKEN: ${{ inputs.repo-token }}
      run: |
        set -euo pipefail
        config_file="$INPUT_CONFIG_FILE"
        if [[ "$config_file" =~ ^([^/]+)/([^/]+)/(.+)@([^@]+)$ ]]; then
          owner="${BASH_REMATCH[1]}"
          repo="${BASH_REMATCH[2]}"
          path="${BASH_REMATCH[3]}"
          ref="${BASH_REMATCH[4]}"
          target="${RUNNER_TEMP:-.}/bomly-review-config.yaml"
          token="$INPUT_EXTERNAL_REPO_TOKEN"
          if [ -z "$token" ]; then
            token="$INPUT_REPO_TOKEN"
          fi
          GH_TOKEN="$token" gh api \
            -H "Accept: application/vnd.github.raw" \
            "repos/${owner}/${repo}/contents/${path}?ref=${ref}" > "$target"
          config_file="$target"
        fi
        echo "path=$config_file" >> "$GITHUB_OUTPUT"

    - name: Run bomly diff
      id: run
      shell: bash
      env:
        BASE_REF: ${{ steps.refs.outputs.base }}
        HEAD_REF: ${{ steps.refs.outputs.head }}
        CONFIG_FILE: ${{ steps.config.outputs.path }}
        INPUT_FAIL_ON_SEVERITY: ${{ inputs.fail-on-severity }}
        INPUT_FAIL_ON_SCOPES: ${{ inputs.fail-on-scopes }}
        INPUT_ALLOW_LICENSES: ${{ inputs.allow-licenses }}
        INPUT_DENY_LICENSES: ${{ inputs.deny-licenses }}
        INPUT_ALLOW_DEPENDENCIES_LICENSES: ${{ inputs.allow-dependencies-licenses }}
        INPUT_ALLOW_GHSAS: ${{ inputs.allow-ghsas }}
        INPUT_DENY_PACKAGES: ${{ inputs.deny-packages }}
        INPUT_DENY_GROUPS: ${{ inputs.deny-groups }}
        INPUT_PROTECTED_PACKAGES: ${{ inputs.protected-packages }}
        INPUT_TYPOSQUAT_THRESHOLD: ${{ inputs.typosquat-threshold }}
        INPUT_TYPOSQUAT_MODE: ${{ inputs.typosquat-mode }}
        INPUT_WARN_ONLY: ${{ inputs.warn-only }}
        INPUT_COMMENT_SUMMARY_IN_PR: ${{ inputs.comment-summary-in-pr }}
      run: |
        set -euo pipefail
        diff_json="${RUNNER_TEMP:-.}/bomly-diff.json"
        summary_md="${RUNNER_TEMP:-.}/bomly-summary.md"
        args=(diff --base "$BASE_REF" --head "$HEAD_REF" --enrich --audit --format json -o "markdown=$summary_md")

        trim() {
          local value="$1"
          value="${value#"${value%%[![:space:]]*}"}"
          value="${value%"${value##*[![:space:]]}"}"
          printf '%s' "$value"
        }
        add_csv_flags() {
          local flag="$1"
          local raw="$2"
          local item
          [ -z "$raw" ] && return 0
          IFS=',' read -ra values <<< "$raw"
          for item in "${values[@]}"; do
            item="$(trim "$item")"
            [ -n "$item" ] && args+=("$flag" "$item")
          done
        }
        add_bool_flag() {
          local flag="$1"
          local raw="$2"
          case "$raw" in
            true) args+=("$flag") ;;
            false|"") ;;
            *) echo "::error::Invalid boolean value '$raw' for $flag"; exit 1 ;;
          esac
        }

        case "$INPUT_COMMENT_SUMMARY_IN_PR" in
          ""|never|always|on-failure) ;;
          *) echo "::error::comment-summary-in-pr must be one of never, always, or on-failure"; exit 1 ;;
        esac
        [ -n "$CONFIG_FILE" ] && args+=(--config "$CONFIG_FILE")
        [ -n "$INPUT_FAIL_ON_SEVERITY" ] && args+=(--fail-on "$INPUT_FAIL_ON_SEVERITY")
        add_csv_flags --fail-on-scope "$INPUT_FAIL_ON_SCOPES"
        add_csv_flags --allow-license "$INPUT_ALLOW_LICENSES"
        add_csv_flags --deny-license "$INPUT_DENY_LICENSES"
        add_csv_flags --license-exempt-package "$INPUT_ALLOW_DEPENDENCIES_LICENSES"
        add_csv_flags --allow-vulnerability-id "$INPUT_ALLOW_GHSAS"
        add_csv_flags --deny-package "$INPUT_DENY_PACKAGES"
        add_csv_flags --deny-group "$INPUT_DENY_GROUPS"
        add_csv_flags --protected-package "$INPUT_PROTECTED_PACKAGES"
        [ -n "$INPUT_TYPOSQUAT_THRESHOLD" ] && args+=(--typosquat-threshold "$INPUT_TYPOSQUAT_THRESHOLD")
        [ -n "$INPUT_TYPOSQUAT_MODE" ] && args+=(--typosquat-mode "$INPUT_TYPOSQUAT_MODE")
        add_bool_flag --warn-only "$INPUT_WARN_ONLY"

        set +e
        bomly "${args[@]}" > "$diff_json"
        exit_code=$?
        set -e
        if [ "$exit_code" -ne 0 ] && [ "$exit_code" -ne 2 ]; then
          exit "$exit_code"
        fi
        echo "diff-json=$diff_json" >> "$GITHUB_OUTPUT"
        echo "summary-md=$summary_md" >> "$GITHUB_OUTPUT"
        echo "exit-code=$exit_code" >> "$GITHUB_OUTPUT"

    - name: Set outputs
      id: extract
      shell: bash
      env:
        DIFF_JSON: ${{ steps.run.outputs.diff-json }}
        SUMMARY_MD: ${{ steps.run.outputs.summary-md }}
      run: |
        set -euo pipefail
        node <<'NODE'
        const fs = require('fs')
        const payload = JSON.parse(fs.readFileSync(process.env.DIFF_JSON, 'utf8'))
        const summary = fs.readFileSync(process.env.SUMMARY_MD, 'utf8')
        const introduced = payload.audit?.introduced || []
        const vulnerable = introduced.filter(f => f.auditor === 'vulnerability')
        const invalidLicenses = introduced.filter(f => f.auditor === 'license')
        const denied = introduced.filter(f => f.auditor === 'package' && String(f.id || '').includes('denied-'))
        const suspicious = introduced.filter(f => f.auditor === 'package' && String(f.id || '').includes('suspicious-package'))
        const failing = introduced.filter(f => !f.disposition || f.disposition === 'fail')
        const values = {
          'dependency-changes': JSON.stringify(payload.results?.dependencies || {}),
          'vulnerable-changes': JSON.stringify(vulnerable),
          'invalid-license-changes': JSON.stringify(invalidLicenses),
          'denied-changes': JSON.stringify(denied),
          'suspicious-package-changes': JSON.stringify(suspicious),
          'comment-content': summary,
          'issue-found': failing.length > 0 ? 'true' : 'false'
        }
        const out = process.env.GITHUB_OUTPUT
        for (const [name, value] of Object.entries(values)) {
          const delim = `bomly_${name}_${Date.now()}_${Math.random().toString(16).slice(2)}`
          fs.appendFileSync(out, `${name}<<${delim}\n${value}\n${delim}\n`)
        }
        NODE
        if [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
          cat "$SUMMARY_MD" >> "$GITHUB_STEP_SUMMARY"
        fi

    - name: Comment on pull request
      if: ${{ steps.refs.outputs.pr != '' && (inputs.comment-summary-in-pr == 'always' || (inputs.comment-summary-in-pr == 'on-failure' && steps.extract.outputs.issue-found == 'true')) }}
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.repo-token }}
        PR_NUMBER: ${{ steps.refs.outputs.pr }}
        SUMMARY_MD: ${{ steps.run.outputs.summary-md }}
      run: |
        set -euo pipefail
        marker="<!-- bomly-review-action-comment -->"
        body_file="${RUNNER_TEMP:-.}/bomly-comment.md"
        payload_file="${RUNNER_TEMP:-.}/bomly-comment.json"
        if [ "$(wc -c < "$SUMMARY_MD")" -gt 65000 ]; then
          printf '# Bomly Diff Summary\n\nThe full summary is available in the workflow job summary.\n\n%s\n' "$marker" > "$body_file"
        else
          cat "$SUMMARY_MD" > "$body_file"
          printf '\n%s\n' "$marker" >> "$body_file"
        fi
        BODY_FILE="$body_file" PAYLOAD_FILE="$payload_file" node <<'NODE'
        const fs = require('fs')
        fs.writeFileSync(process.env.PAYLOAD_FILE, JSON.stringify({body: fs.readFileSync(process.env.BODY_FILE, 'utf8')}))
        NODE
        existing="$(
          gh api "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" --paginate \
            --jq ".[] | select(.body | contains(\"${marker}\")) | .id" | head -n 1
        )"
        if [ -n "$existing" ]; then
          gh api -X PATCH "repos/${GITHUB_REPOSITORY}/issues/comments/${existing}" --input "$payload_file" >/dev/null
        else
          gh api -X POST "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" --input "$payload_file" >/dev/null
        fi

    - name: Complete policy result
      shell: bash
      env:
        EXIT_CODE: ${{ steps.run.outputs.exit-code }}
      run: |
        set -euo pipefail
        if [ "$EXIT_CODE" -ne 0 ]; then
          exit "$EXIT_CODE"
        fi
