name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag, such as v1.2.3
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Check shell syntax
        run: npm run lint:shell

      - name: Check JavaScript syntax
        run: npm run lint:js

      - name: Run tests
        run: npm test

  publish:
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Resolve tag
        id: release
        shell: bash
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          set -euo pipefail
          tag="${INPUT_TAG:-${GITHUB_REF_NAME}}"
          if [[ ! "${tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tag must match vMAJOR.MINOR.PATCH, got ${tag}" >&2
            exit 1
          fi
          major="${tag%%.*}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "major=${major}" >> "$GITHUB_OUTPUT"

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
        run: |
          set -euo pipefail
          notes="Bomly Dependency Review Action ${TAG}"
          if gh release view "${TAG}" >/dev/null 2>&1; then
            gh release edit "${TAG}" --title "${notes}" --notes "${notes}"
          else
            gh release create "${TAG}" --title "${notes}" --notes "${notes}"
          fi

      - name: Move major tag
        env:
          MAJOR_TAG: ${{ steps.release.outputs.major }}
        run: |
          set -euo pipefail
          target_sha="$(git rev-parse HEAD)"
          git tag -f "${MAJOR_TAG}" "${target_sha}"
          git push origin "refs/tags/${MAJOR_TAG}" --force
